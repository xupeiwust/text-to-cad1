<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Browse cached CAD parts, assemblies, and prompt-ready references" />
    <title>CAD Viewer</title>
    <script>
      (function () {
        const root = document.documentElement;
        const storageKey = "cad-viewer:color-scheme";
        const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        let preference = "system";
        try {
          const storedPreference = window.localStorage && window.localStorage.getItem(storageKey);
          if (storedPreference === "light" || storedPreference === "dark" || storedPreference === "system") {
            preference = storedPreference;
          }
        } catch {
          preference = "system";
        }
        const mode = preference === "system" ? (prefersDark ? "dark" : "light") : preference;
        root.dataset.themePreference = preference;
        root.dataset.theme = mode;
        root.classList.toggle("dark", mode === "dark");
        root.style.colorScheme = mode;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/client/main.jsx"></script>
  </body>
</html>
