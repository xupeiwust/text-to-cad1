name: Test Suite

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  version-check:
    name: Version Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check release versions are consistent
        run: scripts/release/bump-version.sh --check

      - name: Check release version is incremented from main
        env:
          PULL_REQUEST_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            base_ref="$PULL_REQUEST_BASE_SHA"
          else
            base_ref="$PUSH_BEFORE_SHA"
          fi
          scripts/release/bump-version.sh --check-incremented-from "$base_ref"

  test-suite:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Install Node dependencies
        run: |
          npm ci --prefix packages/cadjs
          npm ci --prefix viewer
          npm ci --prefix docs

      - name: Run repo test suite
        run: scripts/test.sh
